<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Pricing Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 800px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      box-shadow: 0 0 40px rgba(0,0,0,0.1);
    }

    .header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon { font-size: 24px; }

    .header-text h1 { font-size: 16px; font-weight: 600; }
    .header-text p  { font-size: 12px; color: #aab; margin-top: 2px; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4caf50;
      margin-left: auto;
      box-shadow: 0 0 6px #4caf50;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    .message.user  { align-self: flex-end; flex-direction: row-reverse; }
    .message.agent { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }

    .user  .avatar { background: #1a1a2e; color: #fff; }
    .agent .avatar { background: #e8f0fe; color: #1a73e8; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user  .bubble { background: #1a1a2e; color: #fff; border-bottom-right-radius: 4px; }
    .agent .bubble { background: #f1f3f4; color: #202124; border-bottom-left-radius: 4px; }

    .bubble table {
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 13px;
      width: 100%;
    }
    .bubble th, .bubble td {
      border: 1px solid #ddd;
      padding: 6px 10px;
      text-align: left;
    }
    .bubble th { background: #e8f0fe; }

    .typing {
      display: flex; gap: 4px; padding: 10px 14px;
      background: #f1f3f4; border-radius: 16px; border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing span {
      width: 7px; height: 7px;
      border-radius: 50%; background: #888;
      animation: bounce 1s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #fff;
    }

    textarea {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #1a1a2e; }

    button {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: #1a1a2e;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    button:hover   { background: #16213e; }
    button:active  { transform: scale(0.93); }
    button:disabled { background: #ccc; cursor: not-allowed; }

    .welcome {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin: auto;
      padding: 40px 20px;
    }
    .welcome h2 { font-size: 20px; color: #333; margin-bottom: 8px; }
    .suggestions {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-top: 16px;
    }
    .suggestion {
      background: #f1f3f4; border: 1px solid #ddd;
      border-radius: 16px; padding: 6px 14px;
      font-size: 13px; cursor: pointer; color: #333;
      transition: background 0.2s;
    }
    .suggestion:hover { background: #e8f0fe; border-color: #1a73e8; }

    .error { color: #d32f2f; font-style: italic; }

    .sources {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #dde;
      font-size: 11px;
      color: #666;
      white-space: normal;
    }
    .sources-label { font-weight: 600; margin-right: 4px; }
    .source-chip {
      display: inline-block;
      background: #e8f0fe;
      color: #1a73e8;
      border-radius: 10px;
      padding: 1px 8px;
      margin: 2px 2px 0 0;
      font-size: 11px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-icon">🤖</div>
    <div class="header-text">
      <h1>LLM Pricing Agent</h1>
      <p>Ask anything about LLM costs, models & providers</p>
    </div>
    <div class="status-dot" title="Connected"></div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <h2>👋 Hello!</h2>
      <p>Ask me about LLM pricing, model comparisons, or cost estimates.</p>
      <div class="suggestions">
        <span class="suggestion" onclick="send(this.textContent)">What's the cheapest model?</span>
        <span class="suggestion" onclick="send(this.textContent)">Compare GPT-4o vs Claude</span>
        <span class="suggestion" onclick="send(this.textContent)">Best model for RAG pipelines?</span>
        <span class="suggestion" onclick="send(this.textContent)">Cost for 1M tokens on Anthropic?</span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Ask about LLM pricing..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button id="sendBtn" onclick="send()" title="Send">➤</button>
  </div>
</div>

<script>
  const API_URL = "/agent/chat/stream";

  let conversationId = null;
  let busy = false;

  function escapeHtml(text) {
    return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function formatReply(text) {
    // Convert markdown tables
    text = text.replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+)/g, (match, header, rows) => {
      const ths = header.split("|").filter(c=>c.trim()).map(c=>`<th>${escapeHtml(c.trim())}</th>`).join("");
      const trs = rows.trim().split("\n").map(row => {
        const tds = row.split("|").filter(c=>c.trim()).map(c=>`<td>${escapeHtml(c.trim())}</td>`).join("");
        return `<tr>${tds}</tr>`;
      }).join("");
      return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
    });
    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    // Inline code
    text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
    // Headers
    text = text.replace(/^### (.+)$/gm, "<strong>$1</strong>");
    text = text.replace(/^## (.+)$/gm,  "<strong>$1</strong>");
    return text;
  }

  function addMessage(role, text) {
    const welcome = document.getElementById("welcome");
    if (welcome) welcome.remove();

    const msgs = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `message ${role}`;

    const avatar = role === "user" ? "👤" : "🤖";
    div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="bubble">${role === "agent" ? formatReply(text) : escapeHtml(text)}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  async function send(text) {
    if (busy) return;
    const input = document.getElementById("input");
    const message = (text || input.value).trim();
    if (!message) return;

    input.value = "";
    input.style.height = "auto";
    busy = true;
    document.getElementById("sendBtn").disabled = true;

    addMessage("user", message);

    // Create agent bubble immediately for streaming updates
    const agentDiv = addMessage("agent", "");
    const bubble = agentDiv.querySelector(".bubble");
    bubble.innerHTML = "<em>Thinking\u2026 (step 1)</em>";

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message, conversation_id: conversationId })
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        bubble.innerHTML = `<span class="error">Error ${res.status}: ${escapeHtml(data.detail || "Unknown error")}</span>`;
      } else {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let streamingText = "";

        outer: while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop(); // keep incomplete line
          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const event = JSON.parse(line.slice(6));
            if (event.type === "thinking") {
              bubble.innerHTML = `<em>Thinking\u2026 (step ${event.iteration})</em>`;
              streamingText = "";
            } else if (event.type === "tool_call") {
              bubble.innerHTML += ` <code>🔧 ${escapeHtml(event.tool)}</code>`;
            } else if (event.type === "token") {
              if (streamingText === "") bubble.textContent = "";
              streamingText += event.text;
              bubble.textContent = streamingText;
            } else if (event.type === "answer") {
              conversationId = event.conversation_id;
              bubble.innerHTML = formatReply(event.text);
              const sources = event.sources || [];
              if (sources.length > 0) {
                const chips = sources.map(s => {
                  const name = s.split(/[/\\]/).pop();
                  return `<span class="source-chip">${escapeHtml(name)}</span>`;
                }).join("");
                bubble.innerHTML += `<div class="sources"><span class="sources-label">Sources:</span>${chips}</div>`;
              }
            } else if (event.type === "error") {
              bubble.innerHTML = `<span class="error">${escapeHtml(event.detail || "Unknown error")}</span>`;
            } else if (event.type === "done") {
              break outer;
            }
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
          }
        }
      }
    } catch (err) {
      bubble.innerHTML = `<span class="error">Error: ${escapeHtml(err.message)}</span>`;
      console.error("Stream error:", err);
    }

    busy = false;
    document.getElementById("sendBtn").disabled = false;
    document.getElementById("input").focus();
  }
</script>
</body>
</html>
