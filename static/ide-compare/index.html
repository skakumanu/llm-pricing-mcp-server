<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IDE Tool Comparison — LLM Pricing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --accent: #7c6af7;
      --accent2: #4ecdc4;
      --text: #e2e8f0;
      --muted: #8892a4;
      --danger: #f56565;
      --success: #48bb78;
      --warn: #ed8936;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Shared nav ── */
    .main-nav{display:flex;align-items:center;background:#0f1117;padding:0 1.25rem;height:52px;border-bottom:1px solid #23263a;position:sticky;top:0;z-index:200;gap:.5rem}
    .nav-brand{font-weight:700;color:#7c6af7;text-decoration:none;font-size:1rem;white-space:nowrap;flex-shrink:0}
    .nav-spacer{flex:1}
    .main-nav .nav-links{display:flex;align-items:center;gap:.125rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .main-nav .nav-links::-webkit-scrollbar{display:none}
    .main-nav .nav-links a{color:#8b93a5;text-decoration:none;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;white-space:nowrap;transition:all .15s;border:none}
    .main-nav .nav-links a:hover{background:#1a1d2e;color:#e5e7eb}
    .main-nav .nav-links a.active{background:#1a1d2e;color:#7c6af7;font-weight:600}
    .nav-toggle{display:none;background:none;border:1px solid #2a2d3a;color:#9ca3af;font-size:1.1rem;cursor:pointer;padding:.25rem .5rem;border-radius:6px;line-height:1}
    @media(max-width:640px){
      .nav-toggle{display:block}
      .main-nav .nav-links{display:none;position:absolute;top:52px;left:0;right:0;flex-direction:column;background:#0f1117;border-bottom:1px solid #23263a;padding:.5rem 1rem;gap:.25rem;z-index:199}
      .main-nav .nav-links.open{display:flex}
      .main-nav .nav-links a{padding:.6rem .75rem;font-size:.875rem}
    }

    /* ── Layout ── */
    .page { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

    .page-header {
      margin-bottom: 20px;
    }
    .page-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .page-header p {
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Filter bar ── */
    .filter-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: flex-end;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .filter-group label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .filter-group .input-prefix-wrap {
      display: flex;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
    }
    .filter-group .input-prefix-wrap .prefix {
      padding: 7px 10px;
      color: var(--muted);
      font-size: 13px;
      border-right: 1px solid var(--border);
      background: var(--surface2);
    }
    .filter-group .input-prefix-wrap input[type="number"] {
      background: var(--surface2);
      color: var(--text);
      border: none;
      padding: 7px 10px;
      font-size: 13px;
      width: 90px;
      outline: none;
    }
    .filter-group .input-prefix-wrap input[type="number"]::-webkit-inner-spin-button,
    .filter-group .input-prefix-wrap input[type="number"]::-webkit-outer-spin-button { opacity: 1; }
    .filter-group select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 10px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    .filter-group select:focus { border-color: var(--accent); }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 7px;
      padding-bottom: 2px;
    }
    .checkbox-group input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .checkbox-group label {
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
    }
    .btn-apply {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
      white-space: nowrap;
    }
    .btn-apply:hover { opacity: .85; }

    /* ── Controls row above grid ── */
    .grid-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .result-count {
      font-size: 12px;
      color: var(--muted);
      flex: 1;
    }
    .group-toggle {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
    }
    .group-toggle input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    /* ── Provider group heading ── */
    .provider-group-heading {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin: 24px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .provider-group-heading:first-of-type { margin-top: 0; }

    /* ── Comparison grid ── */
    .compare-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* ── Plan card ── */
    .plan-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color .2s, box-shadow .2s;
    }
    .plan-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent)22;
    }

    /* Card header */
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .provider-logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .card-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .card-title .provider-name {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-title .plan-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Monthly price */
    .monthly-price {
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1;
    }
    .monthly-price.free { color: var(--success); }
    .monthly-price .unit {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--muted);
      margin-left: 2px;
    }

    /* Badges */
    .badges-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .badge-inline { background: #4ecdc422; color: var(--accent2); border: 1px solid #4ecdc444; }
    .badge-ide    { background: #7c6af722; color: var(--accent);  border: 1px solid #7c6af744; }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 600;
    }
    .stat-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .stat-value.na { color: var(--muted); font-weight: 400; }

    /* Use case tags */
    .use-case-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .uc-tag {
      background: var(--surface2);
      color: var(--muted);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      border: 1px solid var(--border);
    }

    /* Best for */
    .best-for {
      font-style: italic;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .best-for-label {
      font-style: normal;
      font-weight: 600;
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 3px;
    }

    /* Strengths */
    .strengths {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .strengths-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 2px;
    }
    .strength-item {
      font-size: 12px;
      color: var(--text);
      padding-left: 12px;
      position: relative;
      line-height: 1.4;
    }
    .strength-item::before {
      content: '•';
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    /* Divider */
    .card-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0;
    }

    /* ── Loading spinner ── */
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 16px;
      color: var(--muted);
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 12px;
      color: var(--muted);
      text-align: center;
    }
    .empty-state .empty-icon { font-size: 2.5rem; }
    .empty-state p { font-size: 14px; max-width: 360px; }

    @media (max-width: 640px) {
      .filter-bar { flex-direction: column; align-items: stretch; }
      .filter-group { width: 100%; }
      .filter-group select,
      .filter-group .input-prefix-wrap { width: 100%; }
      .filter-group .input-prefix-wrap input[type="number"] { flex: 1; width: auto; }
    }
  </style>
</head>
<body>

<nav class="main-nav">
  <a href="/" class="nav-brand">⚡ LLM Pricing</a>
  <span class="nav-spacer"></span>
  <div class="nav-links" id="navLinks">
    <a href="/chat">💬 Chat</a>
    <a href="/calculator">🧮 Calc</a>
    <a href="/compare">⚖️ Compare</a>
    <a href="/ide-compare">💻 IDE Compare</a>
    <a href="/history">📈 History</a>
    <a href="/trends">🔥 Trends</a>
    <a href="/widget">🔌 Widget</a>
    <a href="/billing">💳 Billing</a>
  </div>
  <button class="nav-toggle" id="navToggle" aria-label="Menu">☰</button>
</nav>

<div class="page">

  <div class="page-header">
    <h1>IDE AI Tool Comparison</h1>
    <p>Compare subscription-based AI coding assistants and IDE integrations side by side.</p>
  </div>

  <!-- ── Filter bar ── -->
  <div class="filter-bar">
    <div class="filter-group">
      <label for="maxBudget">Max monthly budget</label>
      <div class="input-prefix-wrap">
        <span class="prefix">$</span>
        <input type="number" id="maxBudget" min="0" step="1" placeholder="No limit" />
      </div>
    </div>

    <div class="filter-group">
      <label>&nbsp;</label>
      <div class="checkbox-group" style="height:34px;">
        <input type="checkbox" id="inlineOnly" />
        <label for="inlineOnly">Inline completion only</label>
      </div>
    </div>

    <div class="filter-group">
      <label for="sortBy">Sort by</label>
      <select id="sortBy">
        <option value="price_asc">Monthly cost ↑</option>
        <option value="price_desc">Monthly cost ↓</option>
        <option value="context_desc">Context window ↓</option>
        <option value="latency_asc">Latency ↑</option>
      </select>
    </div>

    <button class="btn-apply" id="btnApply">Apply</button>
  </div>

  <!-- ── Grid controls ── -->
  <div class="grid-controls">
    <span class="result-count" id="resultCount"></span>
    <label class="group-toggle">
      <input type="checkbox" id="groupByProvider" />
      Group by provider
    </label>
  </div>

  <!-- ── Main content area ── -->
  <div id="mainContent">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <span>Loading IDE tools…</span>
    </div>
  </div>

</div>

<script>
(function () {
  'use strict';

  // ── Nav toggle ──
  var navToggle = document.getElementById('navToggle');
  var navLinks  = document.getElementById('navLinks');
  if (navToggle) {
    navToggle.onclick = function () { navLinks.classList.toggle('open'); };
  }
  // Mark active nav link
  var currentPath = location.pathname.replace(/\/$/, '');
  navLinks.querySelectorAll('a').forEach(function (a) {
    if (a.getAttribute('href') === currentPath || a.getAttribute('href') === currentPath + '/') {
      a.classList.add('active');
    }
    a.addEventListener('click', function () { navLinks.classList.remove('open'); });
  });

  // ── Provider colour palette ──
  var PROVIDER_COLOURS = {
    'github copilot': '#238636',
    'cursor':         '#7c6af7',
    'windsurf':       '#4ecdc4',
    'anthropic':      '#d97706',
    'jetbrains ai':   '#f85a5a',
    'jetbrains':      '#f85a5a',
    'amazon q developer': '#ed8936',
    'amazon':         '#ed8936',
    'tabnine':        '#3b82f6',
  };

  function providerColour(name) {
    var key = (name || '').toLowerCase();
    for (var k in PROVIDER_COLOURS) {
      if (key.indexOf(k) !== -1) return PROVIDER_COLOURS[k];
    }
    // deterministic fallback from name
    var colours = ['#7c6af7','#4ecdc4','#ed8936','#f85a5a','#48bb78','#3b82f6'];
    var hash = 0;
    for (var i = 0; i < key.length; i++) hash = (hash * 31 + key.charCodeAt(i)) & 0xffffffff;
    return colours[Math.abs(hash) % colours.length];
  }

  // ── Format helpers ──
  function formatContext(val) {
    if (val == null) return null;
    if (val >= 1000000) return (val / 1000000).toFixed(0) + 'M';
    if (val >= 1000)    return (val / 1000).toFixed(0) + 'k';
    return String(val);
  }

  function formatLatency(val) {
    if (val == null) return null;
    return Math.round(val) + ' ms';
  }

  function formatPrice(plan) {
    var cost = plan.subscription_monthly_usd;
    if (cost == null || cost === 0) return { text: 'Free', isFree: true };
    return { text: '$' + cost.toFixed(0), isFree: false };
  }

  // ── State ──
  var allPlans   = [];
  var filtered   = [];

  // ── Fetch data ──
  fetch('/pricing')
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function (data) {
      // data may be an array or an object with a list key
      var list = Array.isArray(data) ? data : (data.models || data.pricing || data.data || []);
      // Filter IDE / subscription plans
      allPlans = list.filter(function (p) {
        return p.ide_native === true || p.pricing_model === 'subscription';
      });
      applyFilters();
    })
    .catch(function (err) {
      document.getElementById('mainContent').innerHTML =
        '<div class="empty-state"><span class="empty-icon">⚠️</span>' +
        '<p>Failed to load pricing data: ' + err.message + '</p></div>';
    });

  // ── Filter & sort ──
  function applyFilters() {
    var budget     = parseFloat(document.getElementById('maxBudget').value);
    var inlineOnly = document.getElementById('inlineOnly').checked;
    var sortBy     = document.getElementById('sortBy').value;

    filtered = allPlans.filter(function (p) {
      if (!isNaN(budget) && budget >= 0) {
        var cost = p.subscription_monthly_usd;
        if (cost == null) cost = 0;
        if (cost > budget) return false;
      }
      if (inlineOnly && !p.supports_inline_completion) return false;
      return true;
    });

    filtered.sort(function (a, b) {
      var aPrice   = a.subscription_monthly_usd || 0;
      var bPrice   = b.subscription_monthly_usd || 0;
      var aCtx     = a.context_window || 0;
      var bCtx     = b.context_window || 0;
      var aLat     = a.latency_ms != null ? a.latency_ms : Infinity;
      var bLat     = b.latency_ms != null ? b.latency_ms : Infinity;

      if (sortBy === 'price_asc')    return aPrice - bPrice;
      if (sortBy === 'price_desc')   return bPrice - aPrice;
      if (sortBy === 'context_desc') return bCtx   - aCtx;
      if (sortBy === 'latency_asc')  return aLat   - bLat;
      return 0;
    });

    render();
  }

  // ── Render ──
  function render() {
    var groupByProvider = document.getElementById('groupByProvider').checked;
    var content = document.getElementById('mainContent');
    var countEl = document.getElementById('resultCount');

    countEl.textContent = filtered.length + ' plan' + (filtered.length !== 1 ? 's' : '') + ' shown';

    if (filtered.length === 0) {
      content.innerHTML =
        '<div class="empty-state">' +
        '<span class="empty-icon">🔍</span>' +
        '<p>No plans match your current filters. Try adjusting the budget or removing the inline completion filter.</p>' +
        '</div>';
      return;
    }

    var html = '';

    if (groupByProvider) {
      // group
      var groups = {};
      var order  = [];
      filtered.forEach(function (p) {
        var key = p.provider || 'Other';
        if (!groups[key]) { groups[key] = []; order.push(key); }
        groups[key].push(p);
      });
      order.forEach(function (provider) {
        html += '<h3 class="provider-group-heading">' + esc(provider) + '</h3>';
        html += '<div class="compare-grid">';
        groups[provider].forEach(function (p) { html += cardHtml(p); });
        html += '</div>';
      });
    } else {
      html = '<div class="compare-grid">';
      filtered.forEach(function (p) { html += cardHtml(p); });
      html += '</div>';
    }

    content.innerHTML = html;
  }

  function cardHtml(p) {
    var price      = formatPrice(p);
    var colour     = providerColour(p.provider);
    var initial    = (p.provider || '?').charAt(0).toUpperCase();
    var ctxFmt     = formatContext(p.context_window);
    var latFmt     = formatLatency(p.latency_ms);
    var useCases   = (p.use_cases   || []).slice(0, 3);
    var strengths  = (p.strengths   || []).slice(0, 3);
    var planLabel  = p.model_name   || p.id || '';

    var html = '<div class="plan-card">';

    // Header
    html += '<div class="card-header">';
    html += '<div class="provider-logo" style="background:' + colour + '">' + esc(initial) + '</div>';
    html += '<div class="card-title">';
    html += '<span class="provider-name">' + esc(p.provider || '') + '</span>';
    html += '<span class="plan-name">' + esc(planLabel) + '</span>';
    html += '</div></div>';

    // Price
    html += price.isFree
      ? '<div class="monthly-price free">Free</div>'
      : '<div class="monthly-price">' + esc(price.text) + '<span class="unit">/ mo</span></div>';

    // Badges
    var badges = '';
    if (p.supports_inline_completion) badges += '<span class="badge badge-inline">Inline completion</span>';
    if (p.ide_native)                 badges += '<span class="badge badge-ide">IDE native</span>';
    if (badges) html += '<div class="badges-row">' + badges + '</div>';

    // Stats
    var statsHtml = '';
    if (ctxFmt) {
      statsHtml += '<div class="stat-item"><span class="stat-label">Context</span><span class="stat-value">' + esc(ctxFmt) + '</span></div>';
    }
    if (latFmt) {
      statsHtml += '<div class="stat-item"><span class="stat-label">Latency</span><span class="stat-value">' + esc(latFmt) + '</span></div>';
    }
    if (p.pricing_model) {
      statsHtml += '<div class="stat-item"><span class="stat-label">Model</span><span class="stat-value">' + esc(p.pricing_model) + '</span></div>';
    }
    if (statsHtml) html += '<div class="stats-row">' + statsHtml + '</div>';

    // Use cases
    if (useCases.length > 0) {
      html += '<div class="use-case-tags">';
      useCases.forEach(function (uc) { html += '<span class="uc-tag">' + esc(uc) + '</span>'; });
      html += '</div>';
    }

    // Best for
    if (p.best_for) {
      html += '<div>';
      html += '<div class="best-for-label">Best for</div>';
      html += '<div class="best-for">"' + esc(p.best_for) + '"</div>';
      html += '</div>';
    }

    // Strengths
    if (strengths.length > 0) {
      html += '<div class="strengths">';
      html += '<div class="strengths-label">Strengths</div>';
      strengths.forEach(function (s) {
        html += '<div class="strength-item">' + esc(s) + '</div>';
      });
      html += '</div>';
    }

    html += '</div>'; // .plan-card
    return html;
  }

  function esc(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Wire up controls ──
  document.getElementById('btnApply').addEventListener('click', applyFilters);
  document.getElementById('maxBudget').addEventListener('change', applyFilters);
  document.getElementById('inlineOnly').addEventListener('change', applyFilters);
  document.getElementById('sortBy').addEventListener('change', applyFilters);
  document.getElementById('groupByProvider').addEventListener('change', render);

})();
</script>
