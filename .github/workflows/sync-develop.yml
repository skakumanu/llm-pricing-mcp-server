name: Auto-sync develop from master

on:
  push:
    branches:
      - master

jobs:
  sync-develop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if sync is needed
        id: check
        run: |
          git fetch origin master develop
          if git merge-base --is-ancestor origin/master origin/develop; then
            echo "✅ develop already contains all of master — no sync needed"
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ develop is missing commits from master — creating sync PR"
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync PR
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Close any open stale sync PRs to avoid pile-up
          STALE=$(gh pr list --base develop --state open --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("ci/sync-develop-")) | .number')
          for pr in $STALE; do
            gh pr close "$pr" --comment "Superseded by a newer sync." || true
          done

          BRANCH="ci/sync-develop-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH" origin/master
          git push origin "$BRANCH"

          gh pr create \
            --title "chore(sync): sync develop from master" \
            --body "$(printf 'Automated PR to keep \`develop\` in sync with \`master\`.\n\nAll changes here were already CI-tested on master. Merge once the checks pass to restore git-flow hygiene.')" \
            --base develop \
            --head "$BRANCH" \
            && echo "✅ Sync PR created — merge once CI passes" \
            || {
              echo "⚠️  gh pr create blocked — GITHUB_TOKEN lacks PR-creation permission."
              echo "    Fix: GitHub → repo Settings → Actions → General → enable"
              echo "    'Allow GitHub Actions to create and approve pull requests'."
              echo "ℹ️  Branch '$BRANCH' was pushed — create the PR manually or via the API."
              exit 0
            }
