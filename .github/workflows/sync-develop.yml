name: Auto-sync develop from master

on:
  push:
    branches:
      - master

jobs:
  sync-develop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if sync is needed
        id: check
        run: |
          git fetch origin master develop
          MASTER_TREE=$(git show -s --format="%T" origin/master)
          DEVELOP_TREE=$(git show -s --format="%T" origin/develop)
          if [ "$MASTER_TREE" = "$DEVELOP_TREE" ]; then
            echo "✅ develop already has the same content as master — no sync needed"
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ master has content not in develop — opening sync PR"
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync PR
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="ci/sync-develop-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH" origin/master
          git push origin "$BRANCH"
          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore: sync develop from master" \
            --body "Automated sync of \`develop\` from \`master\`. This PR was opened because \`master\` contains commits (e.g. a hotfix) not yet in \`develop\`."
