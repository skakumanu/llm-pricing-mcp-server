name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=term-missing

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: success()

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  osv_scan:
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.3"
    permissions:
      actions: read
      security-events: write
      contents: read
    with:
      scan-args: |-
        -r
        requirements.txt

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      ACR_NAME: llmpricingacr
      ACR_LOGIN_SERVER: llmpricingacr.azurecr.io
      IMAGE_NAME: llm-pricing-api

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install bandit
      run: |
        python -m pip install --upgrade pip
        pip install bandit

    - name: Run bandit
      run: |
        bandit -r src -q

  deploy:
    needs: [test, lint, osv_scan, security]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    env:
      ACR_NAME: llmpricingacr
      ACR_LOGIN_SERVER: llmpricingacr.azurecr.io
      IMAGE_NAME: llm-pricing-api

    steps:
    - uses: actions/checkout@v4
    - name: Azure Login with OIDC
      uses: azure/login@v2
      with:
        client-id: 8c36eab2-8e8a-40eb-aef2-69ca6655fdcf
        tenant-id: 61deb976-deca-4bb6-8118-55936023b8fc
        subscription-id: faa433ef-c9e9-48c8-842b-42986d4be235

    - name: Get Deployment Secrets from Key Vault
      id: kvsecrets
      run: |
        WEBAPP=$(az keyvault secret show --vault-name llm-pricing-vault --name azure-webapp-name --query value -o tsv)
        RG=$(az keyvault secret show --vault-name llm-pricing-vault --name azure-resource-group --query value -o tsv)
        echo "azure-webapp-name=$WEBAPP" >> "$GITHUB_OUTPUT"
        echo "azure-resource-group=$RG" >> "$GITHUB_OUTPUT"

    - name: ACR Login
      run: |
        az acr login --name "$ACR_NAME"

    - name: Build and Push Image
      run: |
        IMAGE_SHA="$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}"
        IMAGE_LATEST="$ACR_LOGIN_SERVER/$IMAGE_NAME:latest"

        docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" .
        docker push "$IMAGE_SHA"
        docker push "$IMAGE_LATEST"

    - name: Deploy to Production
      run: |
        IMAGE_SHA="$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}"

        az webapp config container set \
          --resource-group "${{ steps.kvsecrets.outputs.azure-resource-group }}" \
          --name "${{ steps.kvsecrets.outputs.azure-webapp-name }}" \
          --container-image-name "DOCKER|$IMAGE_SHA"

        az webapp restart \
          --resource-group "${{ steps.kvsecrets.outputs.azure-resource-group }}" \
          --name "${{ steps.kvsecrets.outputs.azure-webapp-name }}"

        echo "OK: Production deployment complete"

    - name: Health Check - Production
      run: |
        echo "Validating production health..."
        PROD_URL="https://${{ steps.kvsecrets.outputs.azure-webapp-name }}.azurewebsites.net/health"
        EXPECTED_VERSION=$(grep -oP '__version__ = "\K[^"]*' src/__init__.py)

        for attempt in {1..18}; do
          echo "Health check attempt $attempt/18..."
          RESPONSE=$(curl -s "$PROD_URL")
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL")

          if [ "$HTTP_CODE" = "200" ]; then
            ACTUAL_VERSION=$(echo "$RESPONSE" | grep -oP '"version":"?\K[^,"]*')
            if [ "$ACTUAL_VERSION" = "$EXPECTED_VERSION" ]; then
              echo "OK: Production is healthy and running v$ACTUAL_VERSION"
              exit 0
            fi
            echo "Version not yet updated (got $ACTUAL_VERSION, want $EXPECTED_VERSION), waiting..."
          else
            echo "HTTP $HTTP_CODE, waiting..."
          fi
          sleep 10
        done

        echo "WARN: Production health check timeout after 3 minutes"
        exit 0
