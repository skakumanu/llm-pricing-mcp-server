name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=term-missing

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: success()

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  osv_scan:
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.3"
    permissions:
      actions: read
      security-events: write
      contents: read
    with:
      scan-args: |-
        -r
        requirements.txt

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install bandit
      run: |
        python -m pip install --upgrade pip
        pip install bandit

    - name: Run bandit
      run: |
        bandit -r src -q

  secret_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Gitleaks — scan for committed secrets
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy_fly:
    needs: [test, lint, osv_scan, security, secret_scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
    - uses: actions/checkout@v4

    - name: Setup flyctl
      uses: superfly/flyctl-actions/setup-flyctl@master

    - name: Deploy to Fly.io
      run: flyctl deploy --remote-only
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    - name: Health Check - Fly.io
      run: |
        echo "Validating Fly.io health..."
        FLY_URL="https://llm-pricing-api.fly.dev/health"
        EXPECTED_VERSION=$(grep '__version__' src/__init__.py | cut -d'"' -f2)
        echo "Expecting version: $EXPECTED_VERSION"

        for attempt in $(seq 1 18); do
          echo "Health check attempt $attempt/18..."
          RESPONSE=$(curl -s --max-time 10 "$FLY_URL" || echo "")
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$FLY_URL" || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            if echo "$RESPONSE" | grep -q "\"version\":\"$EXPECTED_VERSION\""; then
              echo "OK: Fly.io is healthy and running v$EXPECTED_VERSION"
              exit 0
            fi
            echo "Version not yet updated (want $EXPECTED_VERSION, response: $RESPONSE), waiting..."
          else
            echo "HTTP $HTTP_CODE, waiting..."
          fi
          sleep 10
        done

        echo "WARN: Fly.io health check timeout after 3 minutes"
        exit 0
